name: keep-supabase-awake
# Free Supabase projects pause after ~7 days of no DB activity. This pings the
# products table every 3 days so the shop never goes dark.
on:
  schedule:
    - cron: '0 9 */3 * *'   # every 3 days, 09:00 UTC
  workflow_dispatch:          # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping products table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/products?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON" \
            -H "Authorization: Bearer $SUPABASE_ANON")
          echo "ping returned HTTP $code"
          test "$code" = "200"
